<!DOCTYPE html>
<html lang="uk">
  <head>
    {{ template "head" . }}
    <title>Діагностика системи</title>
    <link rel="stylesheet" href="/static/css/status.css">
  </head>
  <body class="bg-light">
    <div class="container py-4">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0">⚙️ Діагностика</h2>
        <div id="connection-badge" class="badge bg-success">Зв'язок OK</div>
        <button onclick="returnToMain()" class="btn btn-sm btn-outline-secondary">
          На головну
        </button>
      </div>

      <div class="row mb-4 text-center">
        <div class="col-md-3">
          <div class="card shadow-sm status-card p-2 border-primary">
            <small class="text-muted text-uppercase" style="font-size: 0.7rem;">Режим</small>
            <div id="val-mode" class="fw-bold fs-5">---</div>
          </div>
        </div>
        <div class="col-md-3">
          <div class="card shadow-sm status-card p-2 border-primary">
            <small class="text-muted text-uppercase" style="font-size: 0.7rem;">Активна Операція</small>
            <div id="val-active-op" class="fw-bold text-primary">---</div>
          </div>
        </div>
        <div class="col-md-3">
          <div class="card shadow-sm status-card p-2">
            <small class="text-muted text-uppercase" style="font-size: 0.7rem;">Енкодер & Цикл</small>
            <div class="d-flex justify-content-around align-items-baseline">
              <span id="val-encoder" class="data-val">---</span>
              <span id="val-cycle" class="text-muted small">-- ms</span>
            </div>
            <div id="sync-encoder" class="small fw-bold mt-1"></div>
          </div>
        </div>
        <div class="col-md-3">
          <div class="card shadow-sm status-card p-2" id="safety-card">
            <small class="text-muted text-uppercase" style="font-size: 0.7rem;">Hardware Safety</small>
            <div id="val-safety" class="fw-bold text-success">ОЧІКУВАННЯ...</div>
            <small id="val-stop-reason" class="text-danger fw-bold" style="font-size: 0.7rem;"></small>
          </div>
        </div>
      </div>

      <div class="row">
        <div class="col-lg-6 mb-4">
          <div class="card shadow-sm border-0">
            <div id="header-in" class="card-header d-flex justify-content-between align-items-center bg-success text-white py-2">
              <span class="fw-bold">ВХОДИ (Device 10)</span>
              <span id="sync-inputs" class="badge bg-light text-success">CHECKING</span>
            </div>
            <div class="card-body">
              <div id="inputs-grid" class="io-grid"></div>
            </div>
          </div>
        </div>

        <div class="col-lg-6 mb-4">
          <div id="outputs-container" class="card shadow-sm border-0">
            <div id="header-out" class="card-header d-flex justify-content-between align-items-center py-2">
              <span class="fw-bold">ВИХОДИ (Device 20)</span>
              <span id="sync-outputs" class="badge bg-light text-success">CHECKING</span>
            </div>
            <div class="card-body">
              <div id="outputs-grid" class="io-grid"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="/static/js/status.js" defer></script>
  </body>
</html>
